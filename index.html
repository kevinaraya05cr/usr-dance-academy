<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USR Dance Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b0b0b;
color:white;
padding:40px 20px;
}

h1{
text-align:center;
font-size:50px;
margin-bottom:10px;
}

.subtitulo{
text-align:center;
color:#bdbdbd;
margin-bottom:50px;
}

.contenedor{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.tarjeta{

background:#151515;

border:1px solid #2e2e2e;

border-radius:20px;

padding:30px;

transition:.3s;
}

.tarjeta:hover{

transform:translateY(-8px);

border-color:white;

}

h2{

margin-bottom:15px;

font-size:30px;

}

p{

margin:10px 0;

color:#d6d6d6;

}

.boton{

display:block;

margin-top:25px;

background:white;

color:black;

text-align:center;

padding:15px;

border-radius:12px;

text-decoration:none;

font-weight:bold;

}

.boton:hover{

background:#d9d9d9;

}

</style>

</head>

<body>

<h1>HORARIOS</h1>

<p class="subtitulo">Selecciona tu clase y reserva por WhatsApp</p>

<div class="contenedor">

<div class="tarjeta">

<h2>JUEVES</h2>

<p>🕔 5:00 PM - 6:30 PM</p>

<p>Adolescentes y Adultos</p>

<a class="boton" href="#">RESERVAR</a>

</div>

<div class="tarjeta">

<h2>JUEVES</h2>

<p>🕕 6:00 PM - 7:00 PM</p>

<p>Niños (6 a 12 años)</p>

<a class="boton" href="#">RESERVAR</a>

</div>

<div class="tarjeta">

<h2>VIERNES</h2>

<p>🕔 5:00 PM - 6:30 PM</p>

<p>Adolescentes y Adultos</p>

<a class="boton" href="#">RESERVAR</a>

</div>

</div>

</body>
</html>
