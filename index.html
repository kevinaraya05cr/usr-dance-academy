<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USR Dance Studio | Horarios</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:#090909;
color:#fff;
padding:40px 20px;
}
.container{max-width:1100px;margin:auto}
h1{font-size:56px;text-align:center;margin-bottom:10px}
p.sub{color:#bbb;text-align:center;margin-bottom:40px}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:24px;
}
.card{
background:#151515;
border:1px solid #333;
border-radius:22px;
padding:28px;
transition:.25s;
box-shadow:0 8px 30px rgba(0,0,0,.35);
}
.card:hover{transform:translateY(-6px);border-color:#888}
.day{font-size:30px;font-weight:bold;margin-bottom:18px}
.info{color:#d5d5d5;line-height:1.8}
.btn{
display:block;
margin-top:24px;
text-align:center;
background:#fff;
color:#000;
padding:15px;
border-radius:12px;
font-weight:bold;
text-decoration:none;
}
footer{
margin-top:60px;
text-align:center;
color:#888;
font-size:14px;
}
</style>
</head>
<body>
<div class="container">
<h1>HORARIOS</h1>
<p class="sub">Selecciona tu clase y reserva por WhatsApp</p>

<div class="grid">

<div class="card">
<div class="day">JUEVES</div>
<div class="info">
🕔 5:00 PM - 6:30 PM<br>
Adolescentes y Adultos
</div>
<a class="btn" target="_blank"
href="https://wa.me/50686243479?text=Hola,%20quiero%20reservar%20la%20clase%20del%20jueves%20de%205:00%20PM%20a%206:30%20PM.">
RESERVAR
</a>
</div>

<div class="card">
<div class="day">JUEVES</div>
<div class="info">
🕕 6:00 PM - 7:00 PM<br>
Niños (6 a 12 años)
</div>
<a class="btn" target="_blank"
href="https://wa.me/50686243479?text=Hola,%20quiero%20reservar%20la%20clase%20de%20niños%20del%20jueves%20de%206:00%20PM%20a%207:00%20PM.">
RESERVAR
</a>
</div>

<div class="card">
<div class="day">VIERNES</div>
<div class="info">
🕔 5:00 PM - 6:30 PM<br>
Adolescentes y Adultos
</div>
<a class="btn" target="_blank"
href="https://wa.me/50686243479?text=Hola,%20quiero%20reservar%20la%20clase%20del%20viernes%20de%205:00%20PM%20a%206:30%20PM.">
RESERVAR
</a>
</div>

</div>

<footer>USR Dance Studio © 2026</footer>
</div>
</body>
</html>
